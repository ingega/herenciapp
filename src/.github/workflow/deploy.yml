name: Deploy Herenciapp

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/projects/herenciapp
            git pull origin main
            docker build -t herenciapp .
            docker stop herenciapp-container || true
            docker rm herenciapp-container || true
            docker run -d --name herenciapp-container -p 8000:8000 herenciapp