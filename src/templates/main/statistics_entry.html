{% extends "base_nav.html" %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center px-4 sm:px-6 lg:px-8 text-slate-100 
    font-sans">
    
    <div class="max-w-md w-full bg-slate-800 rounded-2xl border border-slate-700 p-8 
        shadow-2xl 
        space-y-6">
        
        <div class="text-center">
            <div class="inline-flex bg-amber-500/10 p-4 rounded-full text-amber-500 mb-3 
                shadow-inner">
                <i class="fa-solid fa-calendar-check text-3xl"></i>
            </div>
            <h2 class="text-2xl font-black tracking-tight text-white">Panel de estadísticas</h2>
            <p class="text-sm text-slate-400 
                mt-2">Selecciona un rango de fechas para consultar promedios
                    estadísticos y financieros.</p>
        </div>

        <form onsubmit="event.preventDefault(); 
            window.location.href='/main/statistics/dashboard?initial_date=' + 
            document.getElementById('init_date').value + '&final_date=' + 
            document.getElementById('final_date').value;" 
              class="space-y-4">
            <!--init date text -->
            <div>
                <label for="init_date" class="block text-xs font-bold tracking-wider 
                    text-slate-400 mb-2">
                    Introduce la fecha inicial con formato mm/dd/aaaa:
                </label>
                <div class="relative">
                    <input type="date" 
                           id="init_date" 
                           required
                           class="w-full bg-slate-900 border border-slate-700 
                           rounded-xl px-4 py-3 text-amber-400 font-mono font-bold 
                           focus:outline-none focus:border-amber-500 transition-colors 
                           shadow-inner" />
                </div>
            </div>
            <!--end date text -->
            <div>
                <label for="final_date" class="block text-xs font-bold tracking-wider 
                    text-slate-400 mb-2">
                    Introduce la fecha final con formato mm/dd/aaaa:
                </label>
                <div class="relative">
                    <input type="date" 
                           id="final_date" 
                           required
                           class="w-full bg-slate-900 border border-slate-700 
                           rounded-xl px-4 py-3 text-amber-400 font-mono font-bold 
                           focus:outline-none focus:border-amber-500 transition-colors 
                           shadow-inner" />
                </div>
            </div>

            <button type="submit" 
                    class="w-full bg-amber-500 hover:bg-amber-600 active:bg-amber-700 
                    text-slate-950 font-black tracking-wide py-3 px-4 rounded-xl shadow-lg 
                    hover:shadow-amber-500/10 transition-all duration-200 flex items-center 
                    justify-center gap-2 group">
                <i class="fa-solid fa-chart-pie text-lg transition-transform 
                    group-hover:rotate-12"></i>
                Abrir panel
            </button>
        </form>

        <div class="pt-4 border-t border-slate-700/60 text-center">
            <a href="/" class="text-xs font-semibold text-slate-500 
                hover:text-slate-400 transition-colors">
                <i class="fa-solid 
                    fa-arrow-left mr-1"></i> Regresar al panel principal
            </a>
        </div>
    </div>
</div>
{% endblock %}
