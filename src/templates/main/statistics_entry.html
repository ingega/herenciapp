{% extends "base_nav.html" %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center px-4 sm:px-6 lg:px-8 text-slate-100 font-sans">
    
    <div class="max-w-md w-full bg-slate-800 rounded-2xl border border-slate-700 p-8 shadow-2xl space-y-6">
        
        <div class="text-center">
            <div class="inline-flex bg-amber-500/10 p-4 rounded-full text-amber-500 mb-3 shadow-inner">
                <i class="fa-solid fa-calendar-check text-3xl"></i>
            </div>
            <h2 class="text-2xl font-black tracking-tight text-white">Historical Audit Panel</h2>
            <p class="text-sm text-slate-400 mt-2">Select a business calendar date to review sales, tickets, and shifts velocity metrics.</p>
        </div>

        <form onsubmit="event.preventDefault(); window.location.href='/main/statistics/' + document.getElementById('target_date').value;" 
              class="space-y-4">
            
            <div>
                <label for="target_date" class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">
                    Choose Operating Date:
                </label>
                <div class="relative">
                    <input type="date" 
                           id="target_date" 
                           required
                           class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-amber-400 font-mono font-bold focus:outline-none focus:border-amber-500 transition-colors shadow-inner" />
                </div>
            </div>

            <button type="submit" 
                    class="w-full bg-amber-500 hover:bg-amber-600 active:bg-amber-700 text-slate-950 font-black tracking-wide py-3 px-4 rounded-xl shadow-lg hover:shadow-amber-500/10 transition-all duration-200 flex items-center justify-center gap-2 group">
                <i class="fa-solid fa-chart-pie text-lg transition-transform group-hover:rotate-12"></i>
                Generate Analytics
            </button>
        </form>

        <div class="pt-4 border-t border-slate-700/60 text-center">
            <a href="/orders/dashboard" class="text-xs font-semibold text-slate-500 hover:text-slate-400 transition-colors">
                <i class="fa-solid fa-arrow-left mr-1"></i> Back to live operational display
            </a>
        </div>
    </div>
</div>
{% endblock %}
