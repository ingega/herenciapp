<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>{{ config.APP_NAME }}</title>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-body text-center">
                <h1>Bienvenid@s a {{ config.RESTAURANT_NAME }}</h1>
                <p>Domicilio: {{ config.RESTAURANT_ADDRESS }}</p>
                <p>Teléfono: {{ config.RESTAURANT_PHONE }}</p>
                <p class="text-muted">Hora Actual del Servidor: {{ current_time }}</p>
                <p class="lead">Estado del Sistema: <span class="badge bg-success">En Línea</span></p>
            </div>
        </div>
    </div>
    // Optional: Show restaurant logo if configured
    {% if config.SHOW_LOGO %}
        <div class="mb-4">
            <img src="{{ url_for('static', path='images/' + config.RESTAURANT_LOGO_NAME) }}" 
            alt="{{ config.RESTAURANT_NAME }} Logo" 
            class="img-fluid" 
            style="max-height: 150px;">
        </div>
    {% endif %}
</body>
</html>
