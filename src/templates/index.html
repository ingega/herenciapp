<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>{{ config.APP_NAME }}</title>
</head>
<body class="bg-light">
    <div class="container mt-5">
    <div class="card shadow border-0"> <div class="card-body text-center p-5"> {% if config.SHOW_LOGO %}
                <div class="mb-4">
                    <img src="{{ url_for('static', path='images/' + config.RESTAURANT_LOGO_NAME) }}" 
                         alt="{{ config.RESTAURANT_NAME }} Logo" 
                         class="img-fluid rounded" 
                         style="max-height: 120px; object-fit: contain;">
                </div>
            {% endif %}

            <h1 class="display-5 fw-bold mb-3">Bienvenid@s a {{ config.RESTAURANT_NAME }} versión: {{ version }}</h1>
            
            <div class="mb-4">
                <p class="mb-1"><strong>Domicilio:</strong> {{ config.RESTAURANT_ADDRESS }}</p>
                <p><strong>Teléfono:</strong> {{ config.RESTAURANT_PHONE }}</p>
            </div>

            <hr class="my-4"> <div class="d-flex justify-content-center align-items-center gap-3">
                <p class="text-muted mb-0 small">Hora del Servidor: {{ current_time }}</p>
                <div class="vr"></div> <p class="mb-0">
                    <span class="badge rounded-pill bg-success">Sistema En Línea</span>
                </p>
            </div>
            
        </div>
    </div>
</div>
</body>
</html>
