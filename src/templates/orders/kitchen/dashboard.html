{% extends "base_nav.html" %}

{% block title %}Tablero de Órdenes (Cocina){% endblock %}

{% block content %}
<script src="https://unpkg.com/htmx.org@1.9.10" defer></script>
<script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>

<div class="w-full px-4 sm:px-8 py-6" 
     x-data="{ lastRefreshed: new Date().toLocaleTimeString() }"
     x-init="console.log('🚀 [ALPINE DIAGNOSTIC] Alpine runtime successfully connected and active!')"
     @tick.window="console.log('⚡ [ALPINE DIAGNOSTIC] Tick event captured!'); lastRefreshed = new Date().toLocaleTimeString()">
     
    <div class="flex items-center justify-between border-b border-slate-700 pb-4 mb-6">
        <div>
            <h1 class="text-3xl font-bold text-yellow tracking-wide">👨‍🍳 Kitchen Dashboard</h1>
            <p class="text-sm text-slate-400 mt-1">
                Live active ticket feeds • <span class="text-xs font-mono text-indigo-400">Last update: <span x-text="lastRefreshed"></span></span>
            </p>
        </div>
        
        <div class="flex items-center space-x-2 bg-slate-800 px-3 py-1.5 
            rounded-full border border-emerald-500/30">
            <span class="relative flex h-3 w-3">
                <span class="animate-ping absolute inline-flex h-full w-full 
                rounded-full bg-emerald-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
            </span>
            <span class="text-xs font-semibold text-emerald-400 
            tracking-wider uppercase">Engine Live</span>
        </div>
    </div>

    <div class="min-h-screen bg-slate-950 p-6 text-slate-100 rounded-xl 
        border border-slate-900 shadow-2xl">
        <h2 class="text-2xl font-bold mb-6 text-slate-400">Live Kitchen Operations Desk</h2>
    
        <div id="kitchen-cards-container" 
             class="w-full transition-all duration-300"
             hx-get="/orders/kitchen/cards" 
             hx-trigger="load, every 15s"
             hx-swap="innerHTML"
             hx-on::after-request="console.log('🛰️ [HTMX DIAGNOSTIC] Network request finished! Status:', event.detail.xhr.status); window.dispatchEvent(new CustomEvent('tick'))">
    
            {% include "orders/kitchen/cards.html" %}
    
        </div>
    </div>
</div>
{% endblock %}
