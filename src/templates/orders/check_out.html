<div id="checkout-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center z-50 animate-fade-in">
    
    <div class="bg-slate-900 border border-slate-800 rounded-xl shadow-2xl max-w-md w-full p-6 space-y-4">
        
        <div class="flex justify-between items-center border-b border-slate-800 pb-3">
            <h3 class="text-lg font-bold text-white flex items-center gap-2">
                <i class="fa-solid fa-calculator text-amber-500"></i> Liquidar Mesa {{ order.table_no }}
            </h3>
            <button type="button" onclick="document.getElementById('checkout-modal').remove()" class="text-slate-400 hover:text-slate-200">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <div class="bg-slate-950/50 p-3 rounded-lg border border-slate-800/60 font-mono text-xs space-y-1.5 text-slate-400">
            <div class="flex justify-between"><span>Subtotal:</span><span class="text-slate-200">${{ order.total }}</span></div>
            <div class="flex justify-between"><span>Descuento:</span><span class="text-rose-400">-${{ order.discount }}</span></div>
            <div class="flex justify-between border-t border-slate-800 pt-1.5 font-bold text-sm">
                <span class="text-slate-300">Total Sugerido:</span>
                <span class="text-emerald-400">${{ order.total - order.discount }}</span>
            </div>
        </div>

        <form hx-patch="/orders/{{ order.id }}/closed"
            hx-ext="json-enc"
            hx-trigger="submit"
            hx-target="#order-card-{{ order.id }}"
            hx-swap="outerHTML"
            hx-on::after-request="if(event.detail.successful) 
                document.getElementById('checkout-modal').remove()"
            class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">
                    Método de Pago
                </label>
                <select name="pay_method" 
                        class="w-full bg-slate-950 border border-slate-800 rounded px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-emerald-500 transition-colors cursor-pointer">
                    <option value="cash">💵 Efectivo</option>
                    <option value="card">💳 Tarjeta</option>
                    <option value="transfer">📱 Transferencia</option>
                    <option value="crypto">🪙 Crypto</option>
                    <option value="mixed">🔀 Mixto</option>
                </select>
            </div>
            
    <div x-data="{ 
            subtotal: {{ (order.total - order.discount)|default(0.00) }}, 
            tip: '0.00', 
            pago: '',
            
            // Dynamic getter that calculates total + tip automatically
            get grandTotal() {
                let base = parseFloat(this.subtotal) || 0;
                let extraTip = parseFloat(this.tip) || 0;
                return base + extraTip;
            },
            
            // Dynamic getter to instantly track change based on new grandTotal
            get cambio() { 
                let val = (parseFloat(this.pago) || 0) - this.grandTotal; 
                return val > 0 ? val.toFixed(2) : '0.00'; 
            } 
        }" class="space-y-4 bg-slate-900/50 p-4 rounded-lg border border-slate-800/60">

        <div class="flex justify-between items-center pb-2 border-b border-slate-800 font-mono text-sm">
            <span class="text-slate-400 font-sans text-xs uppercase font-bold tracking-wider">Total a Pagar (Con Propina):</span>
            <span class="text-emerald-400 font-bold">$<span x-text="grandTotal.toFixed(2)"></span></span>
        </div>

        <div class="grid grid-cols-3 gap-4">
            
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">
                    Propina: ($)
                </label>
                <div class="relative rounded-md shadow-sm">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-500 font-mono text-sm">
                        $
                    </div>
                    <input type="number" 
                        name="tip" 
                        x-model="tip"
                        step="0.01" 
                        min="0" 
                        placeholder="0.00"
                        class="w-full bg-slate-950 border border-slate-800 rounded px-3 py-2 pl-7 font-mono text-sm text-slate-200 focus:outline-none focus:border-emerald-500 transition-colors"
                        required>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">
                    Pagado: ($)
                </label>
                <div class="relative rounded-md shadow-sm">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-500 font-mono text-sm">
                        $
                    </div>
                    <input type="number" 
                        name="pago" 
                        x-model="pago"
                        step="any" 
                        min="0" 
                        placeholder="0.00"
                        class="w-full bg-slate-950 border border-slate-800 rounded px-3 py-2 pl-7 font-mono text-sm text-slate-200 focus:outline-none focus:border-emerald-500 transition-colors"
                        required>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">
                    Cambio: ($)
                </label>
                <div class="relative rounded-md shadow-sm">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-500 font-mono text-sm">
                        $
                    </div>
                    <div class="w-full bg-slate-900/80 border border-slate-800/40 rounded px-3 py-2 pl-7 font-mono text-sm font-bold transition-colors flex items-center h-[38px]"
                        :class="(parseFloat(pago) >= grandTotal) ? 'text-emerald-400 bg-emerald-950/20 border-emerald-900/50' : 'text-slate-400'">
                        <span x-text="cambio">0.00</span>
                    </div>
                </div>
            </div>

        </div>
    </div>

            <div class="flex gap-2 justify-end pt-2 border-t border-slate-800">
                <button type="button" 
                        onclick="document.getElementById('checkout-modal').remove()"
                        class="bg-slate-800 hover:bg-slate-700 text-slate-300 px-4 py-2 
                        rounded text-xs font-bold transition-colors cursor-pointer">
                    Cancelar
                </button>
                <button type="submit"
                        class="bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-2 
                        rounded text-xs font-bold shadow-lg transition-colors flex 
                        items-center 
                        gap-1 cursor-pointer">
                    <i class="fa-solid fa-check-to-slot"></i> Procesar Pago y Cerrar
                </button>
            </div>
        </form>
    </div>
</div>
