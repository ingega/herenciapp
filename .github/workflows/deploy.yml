name: Deploy Herenciapp to EC2

on:
  push:
    branches: [ main ]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Professional Step: Run tests on GitHub's hardware, not yours
      - name: Set up Python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install Poetry and Dependencies
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          poetry install
      
      - name: Run Pytest
        env:
          # Dummy values to pass Pydantic validation during test collection
          MAIL_USERNAME: dummy_user
          MAIL_PASSWORD: dummy_password
          MAIL_FROM: test@herenciapp.com
        run: poetry run pytest

      # 2. Optimization: SSH into EC2 and manage the "Kitchen Cleanup"
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          debug: true
          script: |
            set -e # Exit immediately if a command fails
            cd ~/fastapi-projects/herenciapp
            
            echo "--- Current Directory Content ---"
            ls -la
            
            echo "--- Pulling latest code ---"
            git pull origin main

            echo "--- Building Docker Image ---"
            # We add --progress=plain to see the build logs in GitHub Actions
            docker compose build --no-cache --progress=plain
            
            echo "--- Starting Container ---"
            docker compose up -d
            
            echo "--- Cleanup ---"
            docker image prune -f

            # Clean up the specialized buildx cache (very important for small disks)
            echo "--- Pruning Docker Builder Cache ---"
            docker builder prune -a -f

            # Vacuum logs older than 1 day to prevent log bloat
            echo "--- Vacuuming Logs ---"
            sudo journalctl --vacuum-time=1d

            # deleting cache installation of pip
            echo "--- Cleaning pip cache ---"
            rm -rf ~/.cache/pip

            # deleting cache installation of poetry
            echo "--- Cleaning Poetry cache ---"
            rm -rf ~/.cache/poetry

            echo "--- Deployment Finished Successfully ---"