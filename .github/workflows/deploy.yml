name: Deploy Herenciapp to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Tests
        run: |
          # Add your pytest command here to ensure no broken code goes live
          # poetry run pytest [cite: 139]

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          debug: true
          script: |
            cd ~/fastapi-projects/herenciapp
            git pull origin main
            docker-compose up -d --build
            docker image prune -f