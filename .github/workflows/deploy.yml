name: Deploy Herenciapp to EC2

on:
  push:
    branches: [ main ]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Professional Step: Run tests on GitHub's hardware, not yours
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Poetry and Dependencies
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          poetry install
      
      - name: Run Pytest
        run: poetry run pytest

      # 2. Optimization: SSH into EC2 and manage the "Kitchen Cleanup"
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          debug: true
          script: |
            cd ~/fastapi-projects/herenciapp
            git pull origin main
            
            # Rebuild only the app, leaving the database volumes untouched
            docker compose up -d --build
            
            # CRITICAL for 8GB disks: Remove old, unused image layers immediately
            docker image prune -f
            docker system prune -f --volumes # Optional: use with caution to clear build cache